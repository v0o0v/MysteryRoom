have_fun: false

code_review:
  disable: false
  comment_severity_threshold: MEDIUM
  max_review_comments: 6
  pull_request_opened:
    summary: true
    code_review: true
    include_drafts: false

ignore_patterns:
  - "Assets/**/Generated/**"
  - "Library/**"
  - "Logs/**"
  - "Temp/**"
  - "Build/**"
  - "obj/**"
  - "**/*.meta"
